version: '3.8'

services:
  postgres:
    image: postgres:15-alpine
    container_name: whatsapp_db
    environment:
      POSTGRES_USER: whatsapp
      POSTGRES_PASSWORD: whatsapp123
      POSTGRES_DB: whatsapp_bot
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U whatsapp"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - whatsapp_network

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: whatsapp_backend
    environment:
      NODE_ENV: production
      PORT: 5000
      DATABASE_TYPE: postgres
      DATABASE_HOST: postgres
      DATABASE_PORT: 5432
      DATABASE_USER: whatsapp
      DATABASE_PASSWORD: whatsapp123
      DATABASE_NAME: whatsapp_bot
      JWT_SECRET: super-secret-jwt-key-change-in-production
      SOCKET_IO_CORS_ORIGIN: http://localhost:3000
    ports:
      - "5000:5000"
    depends_on:
      postgres:
        condition: service_healthy
    volumes:
      - ./backend/data:/app/data
      - ./backend/sessions:/app/sessions
    networks:
      - whatsapp_network
    restart: unless-stopped

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: whatsapp_frontend
    environment:
      VITE_API_URL: http://localhost:5000
      VITE_SOCKET_URL: http://localhost:5000
    ports:
      - "3000:3000"
    depends_on:
      - backend
    networks:
      - whatsapp_network
    restart: unless-stopped

volumes:
  postgres_data:

networks:
  whatsapp_network:
    driver: bridge
